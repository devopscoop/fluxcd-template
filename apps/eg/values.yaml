# Envoy Gateway controller (control plane). This is NOT the data-plane Envoy
# proxy — proxy replicas/HA are set per-Gateway on the EnvoyProxy resource in
# apps/eg-custom-resources/envoyproxy.yaml.
deployment:
  replicas: 2
config:
  envoyGateway:
    provider:
      type: Kubernetes
    gateway:
      controllerName: gateway.envoyproxy.io/gatewayclass-controller
    logging:
      level:
        default: warn

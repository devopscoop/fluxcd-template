# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: eg
spec:
  interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: eg-values
    - kind: Secret
      name: eg-secrets
  chartRef:
    kind: OCIRepository
    name: eg-gateway-helm

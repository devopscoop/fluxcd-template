apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
spec:
  chart:
    spec:
      chart: external-dns
      version: 1.20.0
      sourceRef:
        kind: HelmRepository
        name: external-dns
  interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: external-dns-values
    - kind: Secret
      name: external-dns-secrets

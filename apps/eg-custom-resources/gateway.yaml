# Minimal starting Gateway: a single HTTP listener open to HTTPRoutes in any
# namespace. This is intentionally generic — add HTTPS listeners per cluster
# (hostname + TLS, typically issued by cert-manager) and restrict allowedRoutes
# to suit. See https://gateway.envoyproxy.io/docs/tasks/security/tls-cert-manager/
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eg
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

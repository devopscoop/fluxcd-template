# EnvoyProxy configures the data-plane Envoy Deployment + its LoadBalancer
# Service for the `eg` GatewayClass.
#
# High availability: put one Envoy per AZ/node and keep every LB node's address
# live in DNS.
#   - replicas: 3 with soft zone + hostname topology spread (maxSkew 1). Envoy
#     Gateway sets no spread by default, and declaring our own DISABLES the
#     kube-scheduler cluster defaults (which cover both zone AND hostname), so
#     both keys are restated here, tightened to maxSkew 1. ScheduleAnyway keeps
#     pods placeable during a zone/node capacity crunch.
#   - matchLabelKeys (owning-gateway-name): scope each constraint to a SINGLE
#     Gateway's pods. If several Gateways share this class they each run their
#     own Envoy fleet; without this key the managed-by/name selector spans ALL
#     fleets, so the scheduler accepts a layout that stacks two pods of one fleet
#     on a node, and (where a descheduler runs) RemoveDuplicates evicts and the
#     scheduler re-stacks it every cycle — an endless LB target flap. No-op with
#     a single Gateway, so it is safe to set always. GA on k8s 1.34+.
#   - envoyPDB caps voluntary disruptions (node drains/updates) at one Envoy at
#     a time so a drain can't take the ingress below two replicas.
#
# The aws-load-balancer-* annotations below are EKS-specific (AWS Load Balancer
# Controller), so they live in an eks marker block (below) that deploy.sh
# uncomments only when k8s_platform=eks. Non-AWS platforms (k0s/talos + MetalLB)
# leave it commented and get their provider's default LoadBalancer Service.
#   - cross-zone-load-balancing-enabled: an AWS NLB withdraws an AZ node's IP
#     from DNS when that AZ has no healthy target; with a single replica that
#     leaves the NLB publishing one IP and effectively single-AZ. Cross-zone
#     lets every AZ node route to targets in any AZ, so all node IPs stay active
#     and routable regardless of pod placement (bills inter-AZ data transfer).
#   - scheme: internal is the safe default. Change to internet-facing for a
#     public gateway.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: eg
spec:
  ipFamily: IPv6
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 3
        pod:
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: ScheduleAnyway
              matchLabelKeys:
                - gateway.envoyproxy.io/owning-gateway-name
              labelSelector:
                matchLabels:
                  app.kubernetes.io/managed-by: envoy-gateway
                  app.kubernetes.io/name: envoy
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: ScheduleAnyway
              matchLabelKeys:
                - gateway.envoyproxy.io/owning-gateway-name
              labelSelector:
                matchLabels:
                  app.kubernetes.io/managed-by: envoy-gateway
                  app.kubernetes.io/name: envoy
      envoyPDB:
        maxUnavailable: 1

# dyff between <(yq . <(helm show values aws-load-balancer-controller/aws-load-balancer-controller --version v3.3.0)) <(yq eval '. * load("values.yaml")' <(helm show values aws-load-balancer-controller/aws-load-balancer-controller --version v3.3.0))
# vim -O <(helm show values aws-load-balancer-controller/aws-load-balancer-controller --version v3.3.0) values.yaml

clusterName: project1-dev

# region and vpcId are auto-discovered from the instance metadata service.
# Set them explicitly to skip the IMDS lookup (e.g. with a strict IMDSv2 hop
# limit):
# region: us-east-2
# vpcId: vpc-xxxxxxxxxxxxxxxxx

# IRSA: on EKS the controller authenticates with the IAM role created in
# aws-eks-template (output: aws_load_balancer_controller_role_arn).
# >>> eks: deploy.sh uncomments this block when k8s_platform=eks
# serviceAccount:
#   annotations:
#     eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/aws-load-balancer-controller"
# <<< eks

podDisruptionBudget:
  maxUnavailable: 1

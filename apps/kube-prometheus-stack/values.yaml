alertmanager:
  route:
    main:
      enabled: true
      hostnames:
        - alertmanager.devops.coop
      parentRefs:
        - name: eg
          namespace: envoy-gateway-system
# Send every alert to Slack. The channel below is not secret, but the webhook
# URL is, so it lives in helm_secrets.yaml (alertmanager.config.global.slack_api_url),
# which Flux merges over this file -- see valuesFrom in release.yaml.
# >>> slack: deploy.sh uncomments this block when slack_alerts=true (variables.sh)
#   config:
#     route:
#       receiver: slack
#     receivers:
#       # The chart's default route sends Watchdog alerts to the 'null' receiver,
#       # and setting receivers here replaces the chart's whole list, so keep it.
#       - name: 'null'
#       - name: slack
#         slack_configs:
#           - channel: '#alerts' # TODO: replace with your Slack channel
#             send_resolved: true
# <<< slack
prometheus:
  route:
    main:
      enabled: true
      hostnames:
        - prometheus.devops.coop
      parentRefs:
        - name: eg
          namespace: envoy-gateway-system
grafana:
  # Provision the Loki store (apps/loki) as a datasource on this Grafana so logs
  # are queryable in Explore. Loki runs single-tenant, so no auth header needed.
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki-gateway.loki.svc.cluster.local
      jsonData:
        maxLines: 1000

  grafana.ini:
    server:
      # Public URL Grafana uses when generating absolute links (e.g. Explore
      # short links); without it they point at the default localhost:3000.
      root_url: https://grafana.devops.coop/

# dyff between <(yq . <(helm show values oci://ghcr.io/prometheus-community/charts/kube-prometheus-stack --version 81.5.0)) <(yq eval '. * load("values.yaml")' <(helm show values oci://ghcr.io/prometheus-community/charts/kube-prometheus-stack --version 81.5.0))
# vim -O <(helm show values oci://ghcr.io/prometheus-community/charts/kube-prometheus-stack --version 81.5.0) values.yaml

alertmanager:
  route:
    main:
      enabled: true
      hostnames:
        - alertmanager.devops.coop
      parentRefs:
        - name: eg
          namespace: envoy-gateway-system
prometheus:
  route:
    main:
      enabled: true
      hostnames:
        - prometheus.devops.coop
      parentRefs:
        - name: eg
          namespace: envoy-gateway-system
grafana:
  # Provision the Loki store (apps/loki) as a datasource on this Grafana so logs
  # are queryable in Explore. Loki runs single-tenant, so no auth header needed.
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki-gateway.loki.svc.cluster.local
      jsonData:
        maxLines: 1000

  grafana.ini:
    server:
      # Public URL Grafana uses when generating absolute links (e.g. Explore
      # short links); without it they point at the default localhost:3000.
      root_url: https://grafana.devops.coop/

# vim -O <(helm show values oci://ghcr.io/prometheus-community/charts/kube-prometheus-stack --version 81.5.0) values.yaml

alertmanager:
  route:
    main:
      enabled: true
      hostnames:
        - alertmanager.devops.coop
      parentRefs:
        - name: eg
          namespace: envoy-gateway-system
  alertmanagerSpec:
    # Public URL Alertmanager uses when generating links (e.g. the title link in
    # Slack notifications); without it they point at the internal service URL
    # http://kube-prometheus-stack-alertmanager.kube-prometheus-stack:9093.
    externalUrl: https://alertmanager.devops.coop
# Send every alert to Slack. The channel below is not secret, but the webhook
# URL is, so it lives in helm_secrets.yaml (alertmanager.config.global.slack_api_url),
# which Flux merges over this file -- see valuesFrom in release.yaml.
# >>> slack: deploy.sh uncomments this block when slack_alerts=true (variables.sh)
#   config:
#     route:
#       receiver: slack
#     receivers:
#       # The chart's default route sends Watchdog alerts to the 'null' receiver,
#       # and setting receivers here replaces the chart's whole list, so keep it.
#       - name: 'null'
#       - name: slack
#         slack_configs:
#           - channel: '#alerts' # TODO: replace with your Slack channel
#             send_resolved: true
# <<< slack
prometheus:
  route:
    main:
      enabled: true
      hostnames:
        - prometheus.devops.coop
      parentRefs:
        - name: eg
          namespace: envoy-gateway-system
  prometheusSpec:
    # Public URL for the "Source" links on alerts (generatorURL); without it
    # they point at the internal service URL on port 9090.
    externalUrl: https://prometheus.devops.coop
grafana:
  # Provision the Loki store (apps/loki) as a datasource on this Grafana so logs
  # are queryable in Explore. Loki runs single-tenant, so no auth header needed.
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki-gateway.loki.svc.cluster.local
      jsonData:
        maxLines: 1000

  grafana.ini:
    server:
      # Public URL Grafana uses when generating absolute links (e.g. Explore
      # short links); without it they point at the default localhost:3000.
      root_url: https://grafana.devops.coop/
# On EKS the scheduler, controller-manager, and etcd run inside the AWS-managed
# control plane and expose no metrics endpoints, and kube-proxy binds its
# metrics to 127.0.0.1, so none of these targets can ever be scraped. Disable
# them so their ServiceMonitors and permanently-firing absence alerts
# (KubeSchedulerDown, KubeControllerManagerDown, KubeProxyDown, ...) go away.
# On k0s/talos these components run on your own nodes, so leave them enabled.
# >>> eks: deploy.sh uncomments this block when k8s_platform=eks
# kubeScheduler:
#   enabled: false
# kubeControllerManager:
#   enabled: false
# kubeEtcd:
#   enabled: false
# kubeProxy:
#   enabled: false
# <<< eks

alertmanager:
  route:
    main:
      enabled: true
      hostnames:
        - alertmanager.devops.coop
      parentRefs:
        - name: eg
          namespace: envoy-gateway-system
  alertmanagerSpec:
    # Public URL Alertmanager uses when generating links (e.g. the title link in
    # Slack notifications); without it they point at the internal service URL
    # http://kube-prometheus-stack-alertmanager.kube-prometheus-stack:9093.
    externalUrl: https://alertmanager.devops.coop

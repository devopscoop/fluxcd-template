# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falcon-platform
spec:
  interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: falcon-platform-values
    - kind: Secret
      name: falcon-platform-secrets
  chart:
    spec:
      chart: falcon-platform
      version: 1.4.0
      sourceRef:
        kind: HelmRepository
        name: crowdstrike

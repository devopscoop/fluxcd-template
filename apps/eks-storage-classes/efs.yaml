apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs
  annotations:
    # reclaimPolicy is immutable; let Flux delete+recreate when it changes.
    kustomize.toolkit.fluxcd.io/force: "enabled"
provisioner: efs.csi.aws.com
mountOptions:
  - iam
parameters:
  provisioningMode: efs-ap

  # fileSystemId comes from the aws-eks-template `efs_id` output — replace the
  # placeholder below with your filesystem id (fs-...).
  # fileSystemId: fs-XXXXXXXXXXXXXXXXX

  directoryPerms: "700"
reclaimPolicy: Retain

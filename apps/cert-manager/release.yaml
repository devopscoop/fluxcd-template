# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
spec:
  chartRef:
    kind: OCIRepository
    name: cert-manager
  interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: cert-manager-values
    - kind: Secret
      name: cert-manager-secrets

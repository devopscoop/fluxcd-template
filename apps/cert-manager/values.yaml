# dyff between <(yq . <(helm show values oci://quay.io/jetstack/charts/cert-manager --version v1.20.0)) <(yq eval '. * load("values.yaml")' <(helm show values oci://quay.io/jetstack/charts/cert-manager --version v1.20.0))
# vim -O <(helm show values oci://quay.io/jetstack/charts/cert-manager --version v1.20.0) values.yaml
crds:
  enabled: true

# https://gateway.envoyproxy.io/docs/tasks/security/tls-cert-manager/#deploying-cert-manager
config:
  apiVersion: controller.config.cert-manager.io/v1alpha1
  kind: ControllerConfiguration
  enableGatewayAPI: true
resources:
  requests:
    cpu: 10m
    memory: 100Mi
  limits:
    memory: 100Mi
webhook:
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      memory: 100Mi
cainjector:
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      memory: 100Mi

# IRSA — only needed when the ClusterIssuer uses the Route53 dns01 solver (see
# apps/cert-manager-custom-resources/clusterissuer.yaml). Annotate the
# cert-manager ServiceAccount with the IAM role ARN output by aws-eks-template
# (cert_manager_role_arn). Leave this off for the http01 or Cloudflare solvers.

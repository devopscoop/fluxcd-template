# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
spec:
  interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: loki-values
    - kind: Secret
      name: loki-secrets
  chart:
    spec:
      chart: loki
      version: 6.52.0
      sourceRef:
        kind: HelmRepository
        name: grafana

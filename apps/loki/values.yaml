# dyff between <(yq . <(helm show values grafana/loki --version 7.0.0)) <(yq eval '. * load("values.yaml")' <(helm show values grafana/loki --version 7.0.0))
# vim -O <(helm show values grafana/loki --version 7.0.0) values.yaml

# Single-process Loki backed by S3-compatible object storage. This is the
# simplest topology that still uses durable object storage (good for up to a
# few tens of GB/day). For higher throughput, switch to SimpleScalable.
deploymentMode: SingleBinary

loki:
  # Single tenant: clients don't need to send an X-Scope-OrgID header, and
  # Grafana can query without per-tenant config. Flip to true for multi-tenancy.
  auth_enabled: false

  commonConfig:
    # Only one instance runs in SingleBinary mode, so chunks are written once.
    # (Default is 3, which is meant for SimpleScalable/Distributed.)
    replication_factor: 1

  # A real install requires an explicit schema. tsdb + v13 is the current
  # recommended combination.
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  # Object storage (AWS S3). Bucket names and region are non-secret and live
  # here. Authentication is via IRSA (see serviceAccount.annotations below), so
  # there are NO static access keys — Loki's AWS SDK picks up credentials from
  # the projected web-identity token automatically.
  storage:
    type: s3
    bucketNames:
      chunks: devopscoop-project1-dev-loki-chunks
      ruler: devopscoop-project1-dev-loki-ruler
    s3:
      region: us-east-2
      # Leave endpoint unset to use the regional AWS S3 endpoint. AWS S3 uses
      # virtual-hosted-style addressing, so path-style stays off.
      s3ForcePathStyle: false
      # --- Static-key / non-AWS alternative (e.g. Rook-Ceph RGW, MinIO) -------
      # If you don't use IRSA, point at a custom endpoint and supply credentials
      # via helm_secrets.yaml instead of the serviceAccount annotation below.
      # For path-style backends, also set s3ForcePathStyle: true.
      # endpoint: CHANGEME-s3-endpoint
      # insecure: false

  # Keep logs from growing in the bucket forever. The compactor (which runs
  # in-process for SingleBinary) handles the actual deletion.
  limits_config:
    retention_period: 744h # 31 days
  compactor:
    retention_enabled: true
    delete_request_store: s3

# IRSA — annotate Loki's ServiceAccount with the IAM role that grants
# read/write to the buckets above. The EKS pod-identity webhook injects the
# web-identity token the AWS SDK uses, so no credentials live in this repo.
# >>> eks-irsa: deploy.sh uncomments this block when k8s_platform=eks
# serviceAccount:
#   annotations:
#     eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/loki-s3"
# <<< eks-irsa

# Run as one Loki pod and turn off the SimpleScalable targets entirely.
singleBinary:
  replicas: 1
  persistence:
    # Local PVC is only used for the WAL and tsdb/boltdb shipper cache, not for
    # log chunks (those go to S3).
    enabled: true
    size: 10Gi
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# The memcached-backed caches request several GB of memory by default. Off for
# a minimal install; enable them later if query performance needs it.
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Extra components we don't need for a basic logging store.
lokiCanary:
  enabled: false
test:
  enabled: false

# The nginx gateway is the single stable endpoint for both pushes and queries.
# Grafana and Alloy both point at http://loki-gateway.loki.svc.cluster.local.
gateway:
  enabled: true

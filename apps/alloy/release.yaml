# https://fluxcd.io/flux/components/helm/helmreleases/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
spec:
  interval: 10m
  valuesFrom:
    - kind: ConfigMap
      name: alloy-values
    - kind: Secret
      name: alloy-secrets
  chart:
    spec:
      chart: alloy
      version: 1.8.2
      sourceRef:
        kind: HelmRepository
        name: grafana

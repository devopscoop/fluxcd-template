apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: eg-custom-resources
  namespace: flux-system
spec:
  # The GatewayClass/EnvoyProxy/Gateway need the Envoy Gateway CRDs, which the
  # eg HelmRelease installs. eg has wait: true, so this waits for it.
  dependsOn:
    - name: eg
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: apps/eg-custom-resources
  prune: true
  wait: true
  timeout: 5m0s
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  suspend: false
